<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F47A20"/>
      <stop offset="50%" style="stop-color:#E85D0C"/>
      <stop offset="100%" style="stop-color:#C94A05"/>
    </linearGradient>
    <linearGradient id="overlayGrad03" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E85D0C" stop-opacity="1"/>
      <stop offset="60%" style="stop-color:#F47A20" stop-opacity="0.7"/>
      <stop offset="100%" style="stop-color:#F47A20" stop-opacity="0"/>
    </linearGradient>
    <filter id="imgShadow03">
      <feDropShadow dx="-8" dy="0" stdDeviation="25" flood-color="#C94A05" flood-opacity="0.5"/>
    </filter>
    <clipPath id="rightClip03">
      <rect x="680" y="40" width="490" height="595" rx="30"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" rx="44" fill="url(#bg03)"/>

  <!-- Right side photo area (styled with building shapes) -->
  <g clip-path="url(#rightClip03)">
    <!-- Sky -->
    <rect x="680" y="40" width="490" height="595" fill="#87CEEB"/>
    <!-- Buildings - Gyeongbokgung style -->
    <!-- Ground -->
    <rect x="680" y="480" width="490" height="155" fill="#8B7355"/>
    <!-- Main palace building -->
    <rect x="730" y="280" width="400" height="200" fill="#B8860B"/>
    <rect x="720" y="260" width="420" height="25" fill="#8B6914"/>
    <!-- Roof layers -->
    <path d="M700 260 L930 200 L1160 260 Z" fill="#556B2F"/>
    <path d="M710 265 L930 195 L1150 265 Z" fill="#6B8E23"/>
    <path d="M740 210 L930 165 L1120 210 Z" fill="#556B2F"/>
    <!-- Columns -->
    <rect x="760" y="290" width="18" height="190" fill="#D4A843"/>
    <rect x="820" y="290" width="18" height="190" fill="#D4A843"/>
    <rect x="880" y="290" width="18" height="190" fill="#D4A843"/>
    <rect x="1020" y="290" width="18" height="190" fill="#D4A843"/>
    <rect x="1080" y="290" width="18" height="190" fill="#D4A843"/>
    <rect x="1120" y="290" width="18" height="190" fill="#D4A843"/>
    <!-- Doors -->
    <rect x="900" y="380" width="60" height="100" rx="5" fill="#2F1B0E"/>
    <rect x="960" y="380" width="60" height="100" rx="5" fill="#2F1B0E"/>
    <!-- Walls pattern -->
    <rect x="780" y="295" width="230" height="80" rx="5" fill="#CD9B20" opacity="0.5"/>
    <rect x="1020" y="295" width="120" height="80" rx="5" fill="#CD9B20" opacity="0.5"/>

    <!-- Cherry blossom tree -->
    <rect x="680" y="360" width="18" height="120" fill="#4A3728"/>
    <ellipse cx="710" cy="330" rx="55" ry="50" fill="#FFB7C5" opacity="0.9"/>
    <ellipse cx="740" cy="310" rx="45" ry="42" fill="#FF91A4" opacity="0.85"/>
    <ellipse cx="700" cy="300" rx="40" ry="38" fill="#FFB7C5" opacity="0.9"/>
    <!-- Blossom details -->
    <circle cx="698" cy="295" r="8" fill="#FF6B8A" opacity="0.6"/>
    <circle cx="720" cy="308" r="6" fill="#FF6B8A" opacity="0.7"/>
    <circle cx="705" cy="318" r="9" fill="#FFD0DB" opacity="0.8"/>

    <!-- Falling petals -->
    <ellipse cx="800" cy="220" rx="5" ry="8" fill="#FFB7C5" opacity="0.8" transform="rotate(30, 800, 220)"/>
    <ellipse cx="850" cy="180" rx="4" ry="7" fill="#FF91A4" opacity="0.7" transform="rotate(-20, 850, 180)"/>
    <ellipse cx="920" cy="150" rx="5" ry="8" fill="#FFB7C5" opacity="0.6" transform="rotate(45, 920, 150)"/>
    <ellipse cx="970" cy="240" rx="4" ry="7" fill="#FFD0DB" opacity="0.7" transform="rotate(-30, 970, 240)"/>
    <ellipse cx="1050" cy="160" rx="5" ry="8" fill="#FF91A4" opacity="0.6" transform="rotate(15, 1050, 160)"/>
    <ellipse cx="1100" cy="200" rx="4" ry="7" fill="#FFB7C5" opacity="0.7" transform="rotate(-45, 1100, 200)"/>
    <ellipse cx="1130" cy="130" rx="5" ry="8" fill="#FFD0DB" opacity="0.6" transform="rotate(30, 1130, 130)"/>

    <!-- Character - K-pop girl -->
    <g transform="translate(1020, 290)">
      <!-- Body shadow -->
      <ellipse cx="65" cy="330" rx="55" ry="20" fill="#C94A05" opacity="0.3"/>
      <!-- Legs -->
      <rect x="42" y="240" width="22" height="90" rx="11" fill="#F0C8A0"/>
      <rect x="66" y="240" width="22" height="90" rx="11" fill="#F0C8A0"/>
      <!-- Shoes -->
      <ellipse cx="53" cy="328" rx="16" ry="10" fill="#FF1744"/>
      <ellipse cx="77" cy="328" rx="16" ry="10" fill="#FF1744"/>
      <!-- Dress/outfit -->
      <path d="M28 130 L102 130 L115 245 L15 245 Z" fill="#FF4081"/>
      <!-- Collar area -->
      <path d="M48 135 L65 155 L82 135" fill="#FFFFFF" opacity="0.9"/>
      <!-- Belt -->
      <rect x="28" y="190" width="74" height="14" rx="7" fill="#C2185B"/>
      <!-- Arms -->
      <path d="M28 140 Q0 170 10 210" stroke="#F0C8A0" stroke-width="18" fill="none" stroke-linecap="round"/>
      <path d="M102 140 Q130 160 128 205" stroke="#F0C8A0" stroke-width="18" fill="none" stroke-linecap="round"/>
      <!-- Hands -->
      <circle cx="10" cy="213" r="12" fill="#F0C8A0"/>
      <circle cx="128" cy="208" r="12" fill="#F0C8A0"/>
      <!-- One hand holding phone -->
      <rect x="118" y="188" width="20" height="32" rx="4" fill="#2F2F2F"/>
      <rect x="120" y="190" width="16" height="26" rx="3" fill="#87CEEB"/>
      <!-- Body top -->
      <rect x="38" y="128" width="54" height="12" rx="6" fill="#FF80AB"/>
      <!-- Head -->
      <circle cx="65" cy="100" r="42" fill="#F0C8A0"/>
      <!-- Hair -->
      <ellipse cx="65" cy="68" rx="44" ry="22" fill="#2F1B0E"/>
      <rect x="21" y="65" width="16" height="50" rx="8" fill="#2F1B0E"/>
      <rect x="88" y="65" width="16" height="40" rx="8" fill="#2F1B0E"/>
      <!-- Face -->
      <circle cx="52" cy="102" r="5" fill="#2F2F2F"/>
      <circle cx="78" cy="102" r="5" fill="#2F2F2F"/>
      <circle cx="53" cy="101" r="2" fill="white"/>
      <circle cx="79" cy="101" r="2" fill="white"/>
      <!-- Eyebrows -->
      <path d="M46 92 Q52 88 58 90" stroke="#2F1B0E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M72 90 Q78 88 84 92" stroke="#2F1B0E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Mouth -->
      <path d="M57 116 Q65 123 73 116" stroke="#E85D0C" stroke-width="2.5" fill="#FF6B8A" stroke-linecap="round"/>
      <!-- Blush -->
      <circle cx="44" cy="112" r="8" fill="#FFB5B5" opacity="0.6"/>
      <circle cx="86" cy="112" r="8" fill="#FFB5B5" opacity="0.6"/>
    </g>

    <!-- Overlay gradient for text readability -->
    <rect x="680" y="40" width="490" height="595" fill="url(#overlayGrad03)"/>
  </g>

  <!-- Badge -->
  <rect x="60" y="58" width="220" height="42" rx="21" fill="rgba(255,255,255,0.25)"/>
  <rect x="60" y="58" width="220" height="42" rx="21" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <text x="80" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">✈️ Du lịch cùng Klook</text>

  <!-- Main headline -->
  <text x="60" y="185" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="58" font-weight="900" fill="#FFFFFF" letter-spacing="-1">SỐNG TRỌN</text>
  <text x="60" y="255" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="58" font-weight="900" fill="#FFD700" letter-spacing="-1">ĐAM MÊ</text>
  <text x="60" y="325" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="58" font-weight="900" fill="#FFFFFF" letter-spacing="-1">K-CULTURE</text>

  <!-- Subtext -->
  <text x="62" y="375" font-family="'Segoe UI', Arial, sans-serif" font-size="21" fill="rgba(255,255,255,0.9)" font-weight="500">Vé vui chơi, tàu xe,</text>
  <text x="62" y="403" font-family="'Segoe UI', Arial, sans-serif" font-size="21" fill="rgba(255,255,255,0.9)" font-weight="500">trải nghiệm Hàn Quốc</text>

  <!-- Tags row -->
  <rect x="62" y="430" width="100" height="34" rx="17" fill="rgba(255,255,255,0.2)"/>
  <text x="112" y="452" font-size="14" fill="white" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600">K-Pop 🎵</text>
  <rect x="174" y="430" width="110" height="34" rx="17" fill="rgba(255,255,255,0.2)"/>
  <text x="229" y="452" font-size="14" fill="white" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600">Seoul 🏙️</text>
  <rect x="296" y="430" width="110" height="34" rx="17" fill="rgba(255,255,255,0.2)"/>
  <text x="351" y="452" font-size="14" fill="white" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600">Busan 🌊</text>

  <!-- CTA -->
  <rect x="62" y="482" width="170" height="54" rx="27" fill="#FFFFFF"/>
  <text x="147" y="516" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#E85D0C" text-anchor="middle">Xem thêm →</text>

  <!-- K flag small decoration -->
  <text x="65" y="590" font-size="30" opacity="0.5">🇰🇷</text>

  <!-- Decorative stars/sparks -->
  <text x="580" y="90" font-size="18" fill="#FFFFFF" opacity="0.6">✦</text>
  <text x="630" y="560" font-size="14" fill="#FFD700" opacity="0.7">✦</text>
</svg>
