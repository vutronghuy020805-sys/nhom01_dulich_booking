<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE8FF"/>
      <stop offset="55%" style="stop-color:#D4CBFF"/>
      <stop offset="100%" style="stop-color:#C4B8F8"/>
    </linearGradient>
    <linearGradient id="cardGrad01" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F5FF"/>
      <stop offset="100%" style="stop-color:#EDE8FF"/>
    </linearGradient>
    <linearGradient id="discGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B61FF"/>
      <stop offset="100%" style="stop-color:#5B43D6"/>
    </linearGradient>
    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F47A20"/>
      <stop offset="100%" style="stop-color:#E85D0C"/>
    </linearGradient>
    <filter id="shadow01" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#7B61FF" flood-opacity="0.2"/>
    </filter>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" rx="44" fill="url(#bg01)"/>

  <!-- Decorative blobs -->
  <ellipse cx="950" cy="120" rx="180" ry="160" fill="#C4B5FD" opacity="0.35"/>
  <ellipse cx="1100" cy="550" rx="140" ry="120" fill="#A78BFA" opacity="0.25"/>
  <ellipse cx="100" cy="600" rx="100" ry="80" fill="#DDD6FE" opacity="0.4"/>
  <circle cx="320" cy="80" r="45" fill="#EDE9FE" opacity="0.5"/>

  <!-- Decorative stars -->
  <g fill="#F47A20" opacity="0.9">
    <polygon points="200,90 204,102 216,102 207,110 210,122 200,115 190,122 193,110 184,102 196,102" transform="scale(0.8) translate(60,30)"/>
    <polygon points="1050,200 1053,208 1061,208 1055,213 1057,221 1050,217 1043,221 1045,213 1039,208 1047,208" transform="scale(0.7)"/>
  </g>
  <g fill="#7B61FF" opacity="0.7">
    <polygon points="80,350 83,360 93,360 85,366 88,376 80,370 72,376 75,366 67,360 77,360" transform="scale(0.6)"/>
    <circle cx="1120" cy="320" r="5" fill="#F47A20" opacity="0.8"/>
    <circle cx="140" cy="200" r="4" fill="#7B61FF" opacity="0.6"/>
    <circle cx="980" cy="420" r="6" fill="#F47A20" opacity="0.5"/>
  </g>

  <!-- Small star sparkles -->
  <text x="88" y="300" font-size="18" fill="#F47A20" opacity="0.8">✦</text>
  <text x="1060" y="160" font-size="14" fill="#7B61FF" opacity="0.7">✦</text>
  <text x="600" y="60" font-size="12" fill="#F47A20" opacity="0.6">✦</text>
  <text x="420" y="620" font-size="16" fill="#A78BFA" opacity="0.7">✦</text>
  <text x="1050" y="490" font-size="10" fill="#F47A20" opacity="0.6">★</text>

  <!-- Main card area -->
  <rect x="60" y="55" width="780" height="565" rx="36" fill="url(#cardGrad01)" opacity="0.0"/>

  <!-- Badge/Tag -->
  <rect x="60" y="58" width="220" height="42" rx="21" fill="#5B43D6"/>
  <text x="80" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">🌸 Sale Hoa Anh Đào</text>

  <!-- Main headline -->
  <text x="60" y="180" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="76" font-weight="900" fill="#2F2F2F" letter-spacing="-1">Sale Hoa</text>
  <text x="60" y="268" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="76" font-weight="900" fill="#2F2F2F" letter-spacing="-1">Anh Đào</text>

  <!-- Subtext -->
  <text x="62" y="320" font-family="'Segoe UI', Arial, sans-serif" font-size="26" fill="#6B5ED6" font-weight="500">Vé tham quan &amp; Trải nghiệm</text>

  <!-- Highlight pill -->
  <rect x="62" y="355" width="280" height="58" rx="29" fill="url(#highlightGrad)"/>
  <text x="202" y="393" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="26" font-weight="900" fill="#FFFFFF" text-anchor="middle">Giảm đến 50%</text>

  <!-- CTA Button -->
  <rect x="62" y="435" width="170" height="54" rx="27" fill="#FFFFFF" filter="url(#softShadow)"/>
  <text x="147" y="469" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#5B43D6" text-anchor="middle">Xem thêm →</text>

  <!-- Right side: Large discount tag illustration -->
  <g transform="translate(870, 120)" filter="url(#shadow01)">
    <!-- Main ticket/discount tag shape -->
    <rect x="0" y="0" width="290" height="400" rx="30" fill="url(#discGrad)"/>
    <!-- Notch holes for ticket effect -->
    <circle cx="0" cy="200" r="22" fill="url(#bg01)"/>
    <circle cx="290" cy="200" r="22" fill="url(#bg01)"/>
    <!-- Dashed line in middle -->
    <line x1="22" y1="200" x2="268" y2="200" stroke="white" stroke-width="3" stroke-dasharray="12,8" opacity="0.5"/>

    <!-- Top section of ticket -->
    <text x="145" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="white" opacity="0.8" text-anchor="middle" font-weight="600">VOUCHER</text>
    <text x="145" y="110" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="62" font-weight="900" fill="#FFD700" text-anchor="middle">50%</text>
    <text x="145" y="148" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="white" opacity="0.9" text-anchor="middle" font-weight="600">GIẢM GIÁ</text>

    <!-- Bottom section -->
    <text x="145" y="260" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="white" opacity="0.7" text-anchor="middle">Hoa Anh Đào Sale</text>
    <!-- Cherry blossom icons -->
    <text x="80" y="310" font-size="30" fill="white" opacity="0.8">🌸</text>
    <text x="155" y="330" font-size="22" fill="white" opacity="0.6">🌸</text>
    <text x="200" y="308" font-size="26" fill="white" opacity="0.7">🌸</text>

    <!-- Small stars on ticket -->
    <text x="30" y="50" font-size="16" fill="#FFD700" opacity="0.9">✦</text>
    <text x="240" y="50" font-size="16" fill="#FFD700" opacity="0.9">✦</text>
    <text x="30" y="175" font-size="12" fill="white" opacity="0.5">✦</text>
    <text x="245" y="175" font-size="12" fill="white" opacity="0.5">✦</text>
  </g>

  <!-- Additional floating petals -->
  <text x="820" y="95" font-size="28" fill="#D4A0FF" opacity="0.7">🌸</text>
  <text x="1160" y="200" font-size="20" fill="#F47A20" opacity="0.5">✦</text>
  <text x="780" y="580" font-size="24" fill="#A78BFA" opacity="0.6">🌸</text>

  <!-- Bottom decorative wave -->
  <path d="M0 620 Q300 590 600 620 Q900 650 1200 620 L1200 675 L0 675 Z" fill="#C4B5FD" opacity="0.25"/>
</svg>
