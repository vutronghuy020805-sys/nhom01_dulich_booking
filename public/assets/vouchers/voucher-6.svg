<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg06" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F4FF"/>
      <stop offset="60%" style="stop-color:#B8E6FF"/>
      <stop offset="100%" style="stop-color:#8DD8FF"/>
    </linearGradient>
    <linearGradient id="planeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F0F8FF"/>
    </linearGradient>
    <linearGradient id="highlightOrange06" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F47A20"/>
      <stop offset="100%" style="stop-color:#FF9B42"/>
    </linearGradient>
    <linearGradient id="skyStreak" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F47A20" stop-opacity="0"/>
      <stop offset="50%" style="stop-color:#F47A20" stop-opacity="0.6"/>
      <stop offset="100%" style="stop-color:#F47A20" stop-opacity="0"/>
    </linearGradient>
    <filter id="planeShadow">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#4AA8D8" flood-opacity="0.3"/>
    </filter>
    <filter id="cloudShadow">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#B0D8F0" flood-opacity="0.4"/>
    </filter>
    <clipPath id="mainClip06">
      <rect width="1200" height="675" rx="44"/>
    </clipPath>
  </defs>

  <g clip-path="url(#mainClip06)">
    <!-- Background sky gradient -->
    <rect width="1200" height="675" fill="url(#bg06)"/>

    <!-- Sun -->
    <circle cx="1100" cy="100" r="90" fill="#FFE566" opacity="0.4"/>
    <circle cx="1100" cy="100" r="65" fill="#FFD700" opacity="0.3"/>
    <circle cx="1100" cy="100" r="45" fill="#FFC200" opacity="0.25"/>

    <!-- Clouds background (large, soft) -->
    <g filter="url(#cloudShadow)">
      <!-- Cloud 1 - large right -->
      <ellipse cx="1050" cy="220" rx="130" ry="70" fill="white" opacity="0.9"/>
      <ellipse cx="980" cy="240" rx="90" ry="60" fill="white" opacity="0.9"/>
      <ellipse cx="1120" cy="240" rx="80" ry="55" fill="white" opacity="0.9"/>
      <ellipse cx="1050" cy="270" rx="140" ry="50" fill="white" opacity="0.95"/>

      <!-- Cloud 2 - medium left -->
      <ellipse cx="200" cy="160" rx="100" ry="55" fill="white" opacity="0.85"/>
      <ellipse cx="150" cy="175" rx="70" ry="48" fill="white" opacity="0.85"/>
      <ellipse cx="260" cy="175" rx="65" ry="44" fill="white" opacity="0.85"/>
      <ellipse cx="200" cy="198" rx="110" ry="42" fill="white" opacity="0.9"/>

      <!-- Cloud 3 - small mid -->
      <ellipse cx="620" cy="120" rx="75" ry="40" fill="white" opacity="0.7"/>
      <ellipse cx="580" cy="132" rx="55" ry="35" fill="white" opacity="0.7"/>
      <ellipse cx="665" cy="132" rx="50" ry="32" fill="white" opacity="0.7"/>
      <ellipse cx="620" cy="148" rx="82" ry="32" fill="white" opacity="0.75"/>

      <!-- Cloud 4 - small bottom right -->
      <ellipse cx="900" cy="580" rx="110" ry="52" fill="white" opacity="0.6"/>
      <ellipse cx="840" cy="595" rx="75" ry="44" fill="white" opacity="0.6"/>
      <ellipse cx="970" cy="595" rx="70" ry="40" fill="white" opacity="0.6"/>
    </g>

    <!-- Speed streaks in sky -->
    <rect x="0" y="300" width="400" height="3" rx="2" fill="url(#skyStreak)" opacity="0.5"/>
    <rect x="0" y="340" width="300" height="2" rx="1" fill="url(#skyStreak)" opacity="0.4"/>
    <rect x="50" y="320" width="350" height="2" rx="1" fill="url(#skyStreak)" opacity="0.35"/>

    <!-- Airplane illustration -->
    <g transform="translate(680, 200)" filter="url(#planeShadow)">
      <!-- Main fuselage -->
      <ellipse cx="250" cy="95" rx="250" ry="55" fill="url(#planeGrad)"/>
      <!-- Nose -->
      <path d="M490 85 Q560 95 490 105 Z" fill="#F0F8FF"/>
      <!-- Tail fin -->
      <path d="M0 70 Q-30 20 30 55" fill="url(#planeGrad)"/>
      <path d="M0 70 Q-30 20 30 55 L0 70 Z" fill="#E8F4FF"/>
      <!-- Side vertical stabilizer -->
      <path d="M30 60 L80 20 L100 60 Z" fill="#F0F8FF"/>
      <!-- Horizontal stabilizers -->
      <path d="M40 85 L-40 60 L20 90 Z" fill="url(#planeGrad)"/>
      <path d="M40 105 L-40 130 L20 100 Z" fill="url(#planeGrad)"/>
      <!-- Main wings -->
      <path d="M150 80 L350 -20 L400 80 Z" fill="url(#planeGrad)"/>
      <path d="M150 110 L350 210 L400 110 Z" fill="url(#planeGrad)"/>
      <!-- Wing details - orange stripe -->
      <path d="M160 85 L340 0 L380 80 L330 30 Z" fill="url(#highlightOrange06)" opacity="0.6"/>
      <path d="M160 105 L340 190 L380 110 L330 155 Z" fill="url(#highlightOrange06)" opacity="0.5"/>
      <!-- Windows row -->
      <ellipse cx="200" cy="82" rx="12" ry="9" fill="#87CEEB" opacity="0.8"/>
      <ellipse cx="240" cy="80" rx="12" ry="9" fill="#87CEEB" opacity="0.8"/>
      <ellipse cx="280" cy="78" rx="12" ry="9" fill="#87CEEB" opacity="0.8"/>
      <ellipse cx="320" cy="78" rx="12" ry="9" fill="#87CEEB" opacity="0.8"/>
      <ellipse cx="360" cy="80" rx="12" ry="9" fill="#87CEEB" opacity="0.8"/>
      <ellipse cx="400" cy="83" rx="12" ry="9" fill="#87CEEB" opacity="0.8"/>
      <ellipse cx="440" cy="87" rx="12" ry="9" fill="#87CEEB" opacity="0.8"/>
      <!-- Orange stripe on body -->
      <rect x="0" y="90" width="500" height="10" rx="5" fill="#F47A20" opacity="0.7"/>
      <!-- Engines under wings -->
      <ellipse cx="280" cy="135" rx="35" ry="15" fill="#D0E8F5"/>
      <ellipse cx="320" cy="55" rx="35" ry="15" fill="#D0E8F5"/>
      <ellipse cx="220" cy="148" rx="28" ry="12" fill="#D0E8F5"/>
      <!-- Engine intake circles -->
      <circle cx="245" cy="135" r="8" fill="#B0D0E8"/>
      <circle cx="285" cy="55" r="8" fill="#B0D0E8"/>
      <!-- Airline logo on tail -->
      <rect x="20" y="30" width="60" height="28" rx="6" fill="#F47A20"/>
      <text x="50" y="50" font-size="11" fill="white" text-anchor="middle" font-weight="bold">SALE</text>
    </g>

    <!-- Ground / horizon -->
    <rect x="0" y="560" width="1200" height="115" fill="#7EC8E3" opacity="0.3"/>
    <path d="M0 560 Q300 540 600 560 Q900 580 1200 560 L1200 675 L0 675 Z" fill="#A8DDF5" opacity="0.25"/>

    <!-- Discount badge floating -->
    <g transform="translate(650, 400)">
      <ellipse cx="85" cy="85" rx="85" ry="85" fill="#F47A20"/>
      <ellipse cx="85" cy="85" rx="75" ry="75" fill="#E85D0C"/>
      <text x="85" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="600">GIẢM</text>
      <text x="85" y="105" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="40" font-weight="900" fill="#FFFFFF" text-anchor="middle">30%</text>
      <text x="85" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.85)" text-anchor="middle">ĐẾN</text>
    </g>
  </g>

  <!-- Badge -->
  <rect x="60" y="58" width="165" height="42" rx="21" fill="#F47A20"/>
  <text x="80" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">☀️ Du lịch hè</text>

  <!-- Main headline - on sky blue -->
  <text x="60" y="190" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="72" font-weight="900" fill="#1A5F7A" letter-spacing="-2">BAY THẢ GA</text>
  <text x="60" y="272" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="68" font-weight="900" fill="#F47A20" letter-spacing="-2">GIÁ CỰC MÊ</text>

  <!-- Subtext -->
  <text x="62" y="318" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#2F6A8A" font-weight="500">Vé máy bay ưu đãi cho mùa hè</text>

  <!-- Stars decoration -->
  <text x="62" y="375" font-size="20" fill="#F47A20" opacity="0.9">✦</text>
  <text x="90" y="375" font-size="20" fill="#F47A20" opacity="0.6">✦</text>
  <text x="118" y="375" font-size="16" fill="#F47A20" opacity="0.4">✦</text>

  <!-- CTA -->
  <rect x="62" y="400" width="175" height="54" rx="27" fill="#F47A20"/>
  <text x="149" y="434" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">Đặt ngay →</text>

  <!-- Small route tags -->
  <rect x="62" y="470" width="140" height="34" rx="17" fill="rgba(26,95,122,0.12)"/>
  <text x="132" y="492" font-size="14" fill="#1A5F7A" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600">✈️ HAN → SGN</text>
  <rect x="215" y="470" width="140" height="34" rx="17" fill="rgba(26,95,122,0.12)"/>
  <text x="285" y="492" font-size="14" fill="#1A5F7A" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600">✈️ SGN → NRT</text>
</svg>
