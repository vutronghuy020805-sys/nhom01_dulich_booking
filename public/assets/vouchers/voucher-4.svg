<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF2E6"/>
      <stop offset="100%" style="stop-color:#FFE0C2"/>
    </linearGradient>
    <linearGradient id="bannerGrad04" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F47A20"/>
      <stop offset="100%" style="stop-color:#E85D0C"/>
    </linearGradient>
    <linearGradient id="card04a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B43D6"/>
      <stop offset="100%" style="stop-color:#7B61FF"/>
    </linearGradient>
    <linearGradient id="card04b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F47A20"/>
      <stop offset="100%" style="stop-color:#FF9B42"/>
    </linearGradient>
    <linearGradient id="card04c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E85D0C"/>
      <stop offset="100%" style="stop-color:#C94A05"/>
    </linearGradient>
    <filter id="cardShadow04">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#F47A20" flood-opacity="0.25"/>
    </filter>
    <filter id="purpleShadow04">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#5B43D6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" rx="44" fill="url(#bg04)"/>

  <!-- Confetti / celebration shapes -->
  <rect x="120" y="60" width="14" height="28" rx="4" fill="#5B43D6" opacity="0.7" transform="rotate(-25, 127, 74)"/>
  <rect x="250" y="45" width="12" height="22" rx="3" fill="#F47A20" opacity="0.7" transform="rotate(15, 256, 56)"/>
  <rect x="380" y="70" width="10" height="20" rx="3" fill="#FFD700" opacity="0.8" transform="rotate(-10, 385, 80)"/>
  <rect x="500" y="50" width="14" height="26" rx="4" fill="#E85D0C" opacity="0.6" transform="rotate(30, 507, 63)"/>
  <rect x="620" y="38" width="12" height="24" rx="3" fill="#5B43D6" opacity="0.7" transform="rotate(-15, 626, 50)"/>
  <rect x="750" y="55" width="10" height="20" rx="3" fill="#F47A20" opacity="0.6" transform="rotate(20, 755, 65)"/>
  <circle cx="90" cy="130" r="8" fill="#FFD700" opacity="0.7"/>
  <circle cx="180" cy="95" r="6" fill="#F47A20" opacity="0.6"/>
  <circle cx="320" cy="105" r="7" fill="#5B43D6" opacity="0.7"/>
  <circle cx="460" cy="82" r="5" fill="#E85D0C" opacity="0.6"/>
  <circle cx="570" cy="110" r="8" fill="#FFD700" opacity="0.8"/>
  <circle cx="700" cy="88" r="6" fill="#5B43D6" opacity="0.7"/>

  <!-- Top banner strip -->
  <rect x="0" y="0" width="1200" height="0" rx="0"/>

  <!-- Badge -->
  <rect x="60" y="58" width="200" height="42" rx="21" fill="#5B43D6"/>
  <text x="82" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">🎉 17.04 – 03.05</text>

  <!-- Main headline -->
  <text x="60" y="178" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="80" font-weight="900" fill="#2F2F2F" letter-spacing="-2">SIÊU SALE</text>
  <text x="60" y="265" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="80" font-weight="900" fill="#F47A20" letter-spacing="-2">VUI LỄ 🎊</text>

  <!-- Subtext -->
  <text x="62" y="310" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#666666" font-weight="500">Deal hot cho kỳ nghỉ sắp tới</text>

  <!-- 3 highlight cards in a row -->
  <!-- Card 1 -->
  <rect x="60" y="340" width="195" height="115" rx="22" fill="url(#card04a)" filter="url(#purpleShadow04)"/>
  <text x="157" y="378" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="600">VOUCHER</text>
  <text x="157" y="415" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="26" font-weight="900" fill="#FFD700" text-anchor="middle">1 triệu</text>
  <text x="157" y="442" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.75)" text-anchor="middle">mỗi ngày</text>

  <!-- Card 2 -->
  <rect x="267" y="340" width="195" height="115" rx="22" fill="url(#card04b)" filter="url(#cardShadow04)"/>
  <text x="364" y="378" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="600">MUA 1</text>
  <text x="364" y="415" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="26" font-weight="900" fill="#FFFFFF" text-anchor="middle">TẶNG 1</text>
  <text x="364" y="442" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle">mỗi ngày</text>

  <!-- Card 3 -->
  <rect x="474" y="340" width="195" height="115" rx="22" fill="url(#card04c)" filter="url(#cardShadow04)"/>
  <text x="571" y="378" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="600">THÊM MÃ</text>
  <text x="571" y="415" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="22" font-weight="900" fill="#FFD700" text-anchor="middle">ƯU ĐÃI</text>
  <text x="571" y="442" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle">giảm thêm</text>

  <!-- CTA Button -->
  <rect x="62" y="478" width="180" height="54" rx="27" fill="#F47A20" filter="url(#cardShadow04)"/>
  <text x="152" y="512" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">Xem thêm →</text>

  <!-- Right side travel illustration -->
  <!-- Suitcase -->
  <g transform="translate(820, 150)">
    <!-- Large suitcase -->
    <rect x="80" y="60" width="200" height="260" rx="24" fill="#5B43D6"/>
    <rect x="80" y="60" width="200" height="260" rx="24" fill="none" stroke="#7B61FF" stroke-width="4"/>
    <!-- Handle -->
    <rect x="145" y="28" width="70" height="14" rx="7" fill="#7B61FF"/>
    <rect x="142" y="28" width="10" height="36" rx="5" fill="#7B61FF"/>
    <rect x="205" y="28" width="10" height="36" rx="5" fill="#7B61FF"/>
    <!-- Zipper line -->
    <line x1="80" y1="175" x2="280" y2="175" stroke="#7B61FF" stroke-width="3" opacity="0.7"/>
    <!-- Straps -->
    <rect x="110" y="70" width="12" height="240" rx="6" fill="#7B61FF" opacity="0.6"/>
    <rect x="238" y="70" width="12" height="240" rx="6" fill="#7B61FF" opacity="0.6"/>
    <!-- Wheels -->
    <circle cx="115" cy="330" r="18" fill="#2F2F2F"/>
    <circle cx="115" cy="330" r="10" fill="#555"/>
    <circle cx="245" cy="330" r="18" fill="#2F2F2F"/>
    <circle cx="245" cy="330" r="10" fill="#555"/>
    <!-- Stickers on suitcase -->
    <rect x="130" y="95" width="100" height="60" rx="10" fill="#FFD700"/>
    <text x="180" y="118" font-size="13" fill="#E85D0C" text-anchor="middle" font-weight="bold">KLOOK</text>
    <text x="180" y="138" font-size="11" fill="#E85D0C" text-anchor="middle">TRAVEL</text>
    <circle cx="230" cy="215" r="22" fill="#F47A20"/>
    <text x="230" y="221" font-size="16" text-anchor="middle">✈️</text>
    <circle cx="125" cy="220" r="18" fill="#FFFFFF" opacity="0.9"/>
    <text x="125" y="226" font-size="13" text-anchor="middle">🌸</text>
  </g>

  <!-- Passport -->
  <g transform="translate(1050, 260)" opacity="0.9">
    <rect x="0" y="0" width="110" height="150" rx="12" fill="#E85D0C"/>
    <rect x="8" y="8" width="94" height="134" rx="8" fill="#C94A05"/>
    <text x="55" y="55" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="600">PASSPORT</text>
    <text x="55" y="80" font-size="28" text-anchor="middle">🌏</text>
    <rect x="18" y="100" width="74" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="18" y="112" width="55" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
    <rect x="18" y="124" width="68" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Airplane icon -->
  <text x="940" y="160" font-size="48" opacity="0.7">✈️</text>

  <!-- Confetti bottom -->
  <rect x="800" y="580" width="12" height="24" rx="3" fill="#5B43D6" opacity="0.6" transform="rotate(20, 806, 592)"/>
  <rect x="900" y="600" width="10" height="20" rx="3" fill="#F47A20" opacity="0.7" transform="rotate(-15, 905, 610)"/>
  <rect x="1050" y="570" width="14" height="28" rx="4" fill="#FFD700" opacity="0.7" transform="rotate(35, 1057, 584)"/>
  <circle cx="850" cy="620" r="7" fill="#E85D0C" opacity="0.6"/>
  <circle cx="1000" cy="595" r="6" fill="#5B43D6" opacity="0.5"/>
  <circle cx="1150" cy="610" r="8" fill="#FFD700" opacity="0.7"/>

  <!-- Stars -->
  <text x="738" y="140" font-size="18" fill="#F47A20" opacity="0.8">✦</text>
  <text x="785" y="580" font-size="14" fill="#5B43D6" opacity="0.7">✦</text>
  <text x="1160" y="120" font-size="16" fill="#FFD700" opacity="0.7">★</text>
</svg>
