<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg02" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="40%" style="stop-color:#C84BC9"/>
      <stop offset="100%" style="stop-color:#6B48FF"/>
    </linearGradient>
    <linearGradient id="codeCard1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" style="stop-color:#FFFFFF" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="codeCard2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" style="stop-color:#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow02" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow02">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" rx="44" fill="url(#bg02)"/>

  <!-- Background circles decorative -->
  <circle cx="200" cy="150" r="180" fill="#FF8C42" opacity="0.2"/>
  <circle cx="1050" cy="500" r="200" fill="#7B2FBE" opacity="0.2"/>
  <circle cx="600" cy="700" r="150" fill="#FF4FB8" opacity="0.15"/>
  <ellipse cx="950" cy="100" rx="120" ry="100" fill="#FFFFFF" opacity="0.08"/>

  <!-- Sparkles and decorations -->
  <text x="90" y="120" font-size="22" fill="#FFD700" opacity="0.9">✦</text>
  <text x="1100" y="180" font-size="18" fill="#FFFFFF" opacity="0.7">✦</text>
  <text x="700" y="45" font-size="14" fill="#FFD700" opacity="0.8">★</text>
  <text x="1130" y="450" font-size="20" fill="#FF9B42" opacity="0.7">✦</text>
  <text x="350" y="620" font-size="16" fill="#FFFFFF" opacity="0.5">✦</text>
  <text x="55" y="530" font-size="14" fill="#FFD700" opacity="0.6">★</text>

  <!-- Oval decorative shapes -->
  <ellipse cx="1150" cy="250" rx="60" ry="40" fill="#FFFFFF" opacity="0.07" transform="rotate(-20, 1150, 250)"/>
  <ellipse cx="100" cy="450" rx="50" ry="35" fill="#FFFFFF" opacity="0.06" transform="rotate(15, 100, 450)"/>

  <!-- Badge -->
  <rect x="60" y="58" width="300" height="42" rx="21" fill="rgba(255,255,255,0.25)"/>
  <rect x="60" y="58" width="300" height="42" rx="21" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <text x="80" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">📅 Ngày 20 – 25 hàng tháng</text>

  <!-- Main headline -->
  <text x="60" y="185" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="68" font-weight="900" fill="#FFFFFF" letter-spacing="-1">SIÊU HỘI</text>
  <text x="60" y="262" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="68" font-weight="900" fill="#FFD700" letter-spacing="-1">THÀNH VIÊN</text>

  <!-- Subtext -->
  <text x="62" y="308" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.88)" font-weight="500">Ưu đãi độc quyền mỗi tháng</text>

  <!-- Two promo code cards -->
  <!-- Card 1 -->
  <rect x="62" y="345" width="230" height="100" rx="20" fill="url(#codeCard1)" filter="url(#cardShadow02)"/>
  <rect x="62" y="345" width="230" height="100" rx="20" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="177" y="390" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-weight="600">MÃ GIẢM</text>
  <text x="177" y="428" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="32" font-weight="900" fill="#FFD700" text-anchor="middle">10%</text>

  <!-- Card 2 -->
  <rect x="308" y="345" width="230" height="100" rx="20" fill="url(#codeCard2)" filter="url(#cardShadow02)"/>
  <rect x="308" y="345" width="230" height="100" rx="20" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="423" y="390" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-weight="600">MÃ GIẢM</text>
  <text x="423" y="428" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="28" font-weight="900" fill="#FFD700" text-anchor="middle">500K</text>

  <!-- CTA -->
  <rect x="62" y="468" width="170" height="54" rx="27" fill="#FFFFFF" filter="url(#cardShadow02)"/>
  <text x="147" y="502" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#C84BC9" text-anchor="middle">Xem thêm →</text>

  <!-- Character illustration (stylized) - right side -->
  <!-- Body -->
  <g transform="translate(820, 80)">
    <!-- Character background blob -->
    <ellipse cx="185" cy="320" rx="165" ry="155" fill="rgba(255,255,255,0.12)"/>

    <!-- Person standing -->
    <!-- Head -->
    <circle cx="185" cy="145" r="55" fill="#FFD5B5"/>
    <!-- Hair -->
    <ellipse cx="185" cy="105" rx="55" ry="30" fill="#3D2314"/>
    <rect x="130" y="100" width="20" height="45" rx="10" fill="#3D2314"/>
    <!-- Eyes -->
    <circle cx="170" cy="148" r="6" fill="#2F2F2F"/>
    <circle cx="200" cy="148" r="6" fill="#2F2F2F"/>
    <circle cx="172" cy="146" r="2" fill="white"/>
    <circle cx="202" cy="146" r="2" fill="white"/>
    <!-- Smile -->
    <path d="M172 168 Q185 178 198 168" stroke="#E85D0C" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="162" cy="162" r="9" fill="#FFB5B5" opacity="0.6"/>
    <circle cx="208" cy="162" r="9" fill="#FFB5B5" opacity="0.6"/>

    <!-- Body / outfit -->
    <rect x="148" y="196" width="74" height="110" rx="20" fill="#FF6B35"/>
    <!-- Collar -->
    <path d="M162 200 L185 225 L208 200" fill="#FFFFFF" opacity="0.8"/>

    <!-- Arms -->
    <rect x="96" y="200" width="55" height="22" rx="11" fill="#FFD5B5" transform="rotate(20, 123, 211)"/>
    <rect x="219" y="200" width="55" height="22" rx="11" fill="#FFD5B5" transform="rotate(-25, 246, 211)"/>

    <!-- Hands holding a voucher card -->
    <rect x="75" y="228" width="70" height="45" rx="10" fill="#FFD700" transform="rotate(-15, 110, 250)"/>
    <text x="108" y="256" font-size="13" fill="#E85D0C" font-weight="bold" text-anchor="middle" transform="rotate(-15, 110, 250)">DEAL!</text>

    <!-- Legs -->
    <rect x="160" y="300" width="28" height="80" rx="14" fill="#3D5A99"/>
    <rect x="182" y="300" width="28" height="80" rx="14" fill="#3D5A99"/>
    <!-- Shoes -->
    <ellipse cx="174" cy="378" rx="20" ry="12" fill="#2F2F2F"/>
    <ellipse cx="196" cy="378" rx="20" ry="12" fill="#2F2F2F"/>

    <!-- Star decorations around character -->
    <text x="80" y="130" font-size="20" fill="#FFD700" opacity="0.9">✦</text>
    <text x="270" y="120" font-size="16" fill="#FFFFFF" opacity="0.8">✦</text>
    <text x="60" y="310" font-size="14" fill="#FFD700" opacity="0.7">★</text>
    <text x="290" y="290" font-size="18" fill="#FFFFFF" opacity="0.7">✦</text>

    <!-- Floating promo badge near character -->
    <rect x="240" y="180" width="120" height="60" rx="15" fill="#FFD700" transform="rotate(12, 300, 210)"/>
    <text x="300" y="208" font-size="13" fill="#E85D0C" font-weight="bold" text-anchor="middle" transform="rotate(12, 300, 210)">-10%</text>
    <text x="300" y="228" font-size="11" fill="#E85D0C" text-anchor="middle" transform="rotate(12, 300, 210)">GIẢM NGAY</text>
  </g>

  <!-- Bottom wave decoration -->
  <path d="M0 630 Q200 610 400 635 Q700 660 1000 630 Q1100 618 1200 630 L1200 675 L0 675 Z" fill="rgba(255,255,255,0.1)"/>
</svg>
